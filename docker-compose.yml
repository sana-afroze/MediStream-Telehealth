# MediStream Telehealth — Stage 1 + Stage 2
# HDFS Data Lake + Spark Batch Transformation Pipeline
#
# Stage 1: HDFS cluster (namenode + 3 datanodes)
# Stage 2: Spark cluster (master + 2 workers + Jupyter PySpark notebook)
#
# Usage:
#   docker compose up -d
#   Wait ~60s for HDFS, then ~30s more for Spark
#   HDFS UI:       http://localhost:9870
#   Spark Master:  http://localhost:8080
#   Jupyter:       http://localhost:8888?token=spark
#   Spark App UI:  http://localhost:4040 (active only while a job runs)

services:

  # ===========================
  # HDFS — Stage 1
  # ===========================

  namenode:
    image: tcsmith314/hadoop-namenode-python311:latest
    container_name: hadoop-namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=medistream
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_replication=2
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/data
      - ./hdfs-init:/hdfs-init
    networks:
      - medistream-network
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  datanode1:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: hadoop-datanode1
    hostname: datanode1
    ports:
      - "9864:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - medistream-network
    mem_limit: 1g
    depends_on:
      namenode:
        condition: service_healthy

  datanode2:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: hadoop-datanode2
    hostname: datanode2
    ports:
      - "9865:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - medistream-network
    mem_limit: 1g
    depends_on:
      namenode:
        condition: service_healthy

  datanode3:
    image: tcsmith314/hadoop-datanode-python311:latest
    container_name: hadoop-datanode3
    hostname: datanode3
    ports:
      - "9866:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode3_data:/hadoop/dfs/data
    networks:
      - medistream-network
    mem_limit: 1g
    depends_on:
      namenode:
        condition: service_healthy

  # ===========================
  # Spark — Stage 2
  # ===========================

  spark-master:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    image: medistream/spark-jovyan:3.5.0
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC port
      - "4040:4040"   # Spark Application UI (active while a job runs)
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - medistream-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  spark-worker-1:
    image: medistream/spark-jovyan:3.5.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - spark-worker-1-data:/opt/spark/work-dir
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - medistream-network
    depends_on:
      spark-master:
        condition: service_healthy

  spark-worker-2:
    image: medistream/spark-jovyan:3.5.0
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8082:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    volumes:
      - spark-worker-2-data:/opt/spark/work-dir
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - medistream-network
    depends_on:
      spark-master:
        condition: service_healthy

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-jupyter
    hostname: spark-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=spark
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - PYSPARK_PYTHON=/opt/miniconda/bin/python3
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - jupyter-data:/home/jovyan/work
    networks:
      - medistream-network
    depends_on:
      spark-master:
        condition: service_healthy

networks:
  medistream-network:
    driver: bridge

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  datanode3_data:
  spark-worker-1-data:
  spark-worker-2-data:
  jupyter-data:
